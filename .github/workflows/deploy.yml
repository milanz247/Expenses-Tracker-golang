name: Deploy Golang Backend

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: go-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          LOWER_REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=$REGISTRY/$LOWER_REPO/$IMAGE_NAME
          docker build -t $IMAGE_ID:latest .
          docker push $IMAGE_ID:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login to GHCR on VPS
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            LOWER_REPO=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_ID=ghcr.io/$LOWER_REPO/go-backend
            
            docker pull $IMAGE_ID:latest
            
            # Remove the old container
            docker stop go-backend-app || true
            docker rm go-backend-app || true
            
            # Run the new container (with Environment variables)
            docker run -d \
              --name go-backend-app \
              --network my-network \
              --restart unless-stopped \
              -p 8081:8081 \
              -e DB_HOST=mysql-db \
              -e DB_PORT=3306 \
              -e DB_USER=root \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e DB_NAME=expense_tracker \
              -e SERVER_PORT=8081 \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              $IMAGE_ID:latest